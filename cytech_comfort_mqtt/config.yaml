name: "Cytech Comfort"
description: "Cytech Comfort MQTT Bridge"
version: "1.0.7-dev1"
slug: "cytech_comfort_mqtt"
init: false
startup: application
apparmor: true

ingress: true
ingress_port: 8099
panel_title: "Comfort Setup"
panel_icon: "mdi:alarm-panel-outline"

codenotary: notary@home-assistant.io
url: "https://github.com/cytechtech/ucmpi4"
hassio_api: true
uart: true
host_network: true
devices:
  - /dev/ttyS0:/dev/ttyS0

privileged:
  - SYS_RAWIO

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

services:
  - mqtt:need

map:
  - addon_config

options:
  comfort_serial_mode: UCMA/Pi
  comfort_login_id: null
  comfort_battery_update: 1
  log_verbosity: INFO
  alarm_inputs: 8
  alarm_outputs: 8
  flag_count: 8
  counter_count: 8
  timer_count: 8
  sensor_count: 8
  alarm_responses: 0
  comfort_time: false
  passthrough_enabled: false


schema:
  comfort_serial_mode: list(UCMA/Pi & CM4Pi on CM9001|CM4Pi on UCMA/General)?
  comfort_login_id: password?
  comfort_battery_update: list(0|1|33|34|35|36|37|38|39)?
  log_verbosity: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)?
  alarm_inputs: list(8|16|24|32|40|48|56|64|72|80|88|96)?
  alarm_outputs: list(0|8|16|24|32|40|48|56|64|72|80|88|96)?
  flag_count: list(0|8|16|24|32|40|48|56|64|72|80|88|96|128|254)?
  counter_count: list(0|8|16|24|32|40|48|56|64|72|80|88|96|128|255)?
  timer_count: list(0|8|16|24|32|40|48|56|64)?
  sensor_count: list(0|8|16|24|32|40|48|56|64)?
  alarm_responses: int(0,1024)?
  comfort_time: bool?
  passthrough_enabled: bool
